# app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: world-countries-prod
  namespace: argocd

  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: argocd-notification

spec:
  project: default

  source:
    repoURL: https://github.com/Chahatyadav1/world-countries-app.git
    path: kubernetes
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
